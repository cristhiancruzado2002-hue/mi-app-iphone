<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSOMA PRO</title>

<link rel="icon" href="icono.png">

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#0a1a2f,#1c2f4a);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.app{
    width:350px;
    background:#2c3e50;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    text-align:center;
}

.logo{
    width:80px;
    margin-bottom:10px;
}

h1{
    margin:10px 0;
}

.menu button{
    width:45%;
    margin:5px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#3498db;
    color:white;
    cursor:pointer;
}

.menu button:hover{
    background:#2980b9;
}

input, select, textarea{
    width:100%;
    margin:5px 0;
    padding:8px;
    border-radius:8px;
    border:none;
}

.btn{
    background:#27ae60;
    padding:10px;
    border:none;
    border-radius:10px;
    color:white;
    width:100%;
    cursor:pointer;
    margin-top:10px;
}

.btn:hover{
    background:#1e8449;
}

.seccion{
    display:none;
    margin-top:15px;
    text-align:left;
}

textarea{
    height:120px;
}
</style>
</head>

<body>

<div class="app">

<img src="icono.png" class="logo">
<h1>SSOMA PRO</h1>

<div class="menu">
    <button onclick="mostrar('personal')">Personal</button>
    <button onclick="mostrar('inspeccion')">Inspección</button>
    <button onclick="mostrar('reporte')">Reportes</button>
</div>

<!-- PERSONAL -->
<div id="personal" class="seccion">
    <h3>Registro Personal</h3>
    <input id="nombre" placeholder="Nombre">
    <input id="dni" placeholder="DNI">
    <input id="cargo" placeholder="Cargo">
    <input id="area" placeholder="Área">
    <button class="btn" onclick="guardarPersonal()">Guardar</button>
</div>

<!-- INSPECCION -->
<div id="inspeccion" class="seccion">
    <h3>Inspección SST</h3>
    <input id="areaIns" placeholder="Área inspeccionada">

    <select id="estado">
        <option>Conforme</option>
        <option>No conforme</option>
    </select>

    <textarea id="obs" placeholder="Observaciones"></textarea>

    <button class="btn" onclick="guardarInspeccion()">Guardar inspección</button>
</div>

<!-- REPORTE -->
<div id="reporte" class="seccion">
    <h3>Reportes</h3>
    <button class="btn" onclick="generarReporte()">Generar reporte</button>
    <textarea id="salida"></textarea>
</div>

</div>

<script>

function mostrar(id){
    document.querySelectorAll('.seccion').forEach(s=>s.style.display='none');
    document.getElementById(id).style.display='block';
}

/* GUARDAR PERSONAL */
function guardarPersonal(){
    let data = {
        nombre:document.getElementById("nombre").value,
        dni:document.getElementById("dni").value,
        cargo:document.getElementById("cargo").value,
        area:document.getElementById("area").value
    };

    let lista = JSON.parse(localStorage.getItem("personal")||"[]");
    lista.push(data);
    localStorage.setItem("personal",JSON.stringify(lista));

    alert("Trabajador guardado");
}

/* GUARDAR INSPECCION */
function guardarInspeccion(){
    let data = {
        area:document.getElementById("areaIns").value,
        estado:document.getElementById("estado").value,
        obs:document.getElementById("obs").value,
        fecha:new Date().toLocaleString()
    };

    let lista = JSON.parse(localStorage.getItem("inspecciones")||"[]");
    lista.push(data);
    localStorage.setItem("inspecciones",JSON.stringify(lista));

    alert("Inspección guardada");
}

/* GENERAR REPORTE */
function generarReporte(){
    let datos = JSON.parse(localStorage.getItem("inspecciones")||"[]");

    let texto = "";

    datos.forEach((d,i)=>{
        texto += "N° " + (i+1) + "\n";
        texto += "Área: " + d.area + "\n";
        texto += "Estado: " + d.estado + "\n";
        texto += "Obs: " + d.obs + "\n";
        texto += "Fecha: " + d.fecha + "\n\n";
    });

    document.getElementById("salida").value = texto;
}

</script>

</body>
</html>
