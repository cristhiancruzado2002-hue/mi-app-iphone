<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSOMA PRO FINAL</title>

<link rel="icon" href="icono.png">

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- FIREBASE -->
<script type="module">

// 🔴 PEGA AQUÍ TU CONFIG REAL
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_DOMINIO",
  projectId: "TU_PROYECTO",
  storageBucket: "TU_BUCKET",
  messagingSenderId: "TU_ID",
  appId: "TU_APP_ID"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// LOGIN AUTOMÁTICO
signInAnonymously(auth);

window.db = db;
window.addDoc = addDoc;
window.getDocs = getDocs;
window.collection = collection;

</script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
.app{max-width:420px;margin:auto;padding:15px;}
input,textarea,select,button{width:100%;margin:5px 0;padding:10px;border-radius:10px;border:none;}
button{background:#22c55e;}
.card{background:#1e293b;padding:10px;border-radius:10px;margin-top:10px;}
</style>
</head>

<body>

<div class="app">

<h2>SSOMA PRO</h2>

<h3>Inspección</h3>

<input id="area" placeholder="Área">
<textarea id="obs" placeholder="Observación"></textarea>

<select id="estado">
<option>Conforme</option>
<option>No conforme</option>
</select>

<button onclick="guardar()">Guardar</button>

<button onclick="ver()">Ver registros</button>

<button onclick="pdf()">Exportar PDF</button>

<div id="lista"></div>

</div>

<script>

// GUARDAR EN FIREBASE
async function guardar(){
await addDoc(collection(db,"inspecciones"),{
area:area.value,
obs:obs.value,
estado:estado.value,
fecha:new Date().toLocaleString()
});
alert("Guardado en la nube");
}

// VER DATOS
async function ver(){
let q=await getDocs(collection(db,"inspecciones"));
lista.innerHTML="";

q.forEach(doc=>{
let d=doc.data();
lista.innerHTML+=`
<div class="card">
${d.area}<br>
${d.estado}<br>
${d.obs}
</div>`;
});
}

// PDF
function pdf(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();

let texto=lista.innerText;

doc.text(texto,10,10);
doc.save("reporte_ssoma.pdf");
}

</script>

</body>
</html>
