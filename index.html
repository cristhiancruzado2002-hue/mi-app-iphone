<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSOMA PRO</title>

<link rel="icon" href="icono.png">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0a1a2f,#1c2f4a);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:380px;
background:#2c3e50;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.logo{
width:70px;
display:block;
margin:auto;
}

h1{text-align:center;}

.menu{
display:flex;
gap:5px;
}

.menu button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#3498db;
color:white;
cursor:pointer;
}

input,select,textarea{
width:100%;
margin:5px 0;
padding:8px;
border:none;
border-radius:8px;
}

.btn{
background:#27ae60;
padding:10px;
border:none;
border-radius:10px;
color:white;
width:100%;
margin-top:5px;
}

.seccion{
display:none;
margin-top:10px;
}

.lista{
background:#1c2833;
padding:10px;
border-radius:10px;
margin-top:10px;
max-height:150px;
overflow:auto;
font-size:12px;
}

img.preview{
width:100%;
margin-top:5px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="app">

<img src="icono.png" class="logo">
<h1>SSOMA PRO</h1>

<div class="menu">
<button onclick="mostrar('personal')">Personal</button>
<button onclick="mostrar('insp')">Inspección</button>
<button onclick="mostrar('rep')">Reporte</button>
</div>

<!-- PERSONAL -->
<div id="personal" class="seccion">
<h3>Personal</h3>
<input id="nombre" placeholder="Nombre">
<input id="dni" placeholder="DNI">
<input id="cargo" placeholder="Cargo">
<input id="area" placeholder="Área">

<button class="btn" onclick="guardarPersonal()">Guardar</button>

<div class="lista" id="listaPersonal"></div>
</div>

<!-- INSPECCION -->
<div id="insp" class="seccion">
<h3>Inspección</h3>

<input id="areaIns" placeholder="Área">
<select id="estado">
<option>Conforme</option>
<option>No conforme</option>
</select>

<textarea id="obs" placeholder="Observación"></textarea>

<input type="file" accept="image/*" id="foto">

<button class="btn" onclick="obtenerGPS()">Obtener ubicación</button>
<p id="gps"></p>

<button class="btn" onclick="guardarInspeccion()">Guardar inspección</button>

<img id="preview" class="preview">

<div class="lista" id="listaIns"></div>
</div>

<!-- REPORTE -->
<div id="rep" class="seccion">
<h3>Reporte</h3>
<button class="btn" onclick="generarReporte()">Generar</button>
<textarea id="salida" style="height:150px;"></textarea>
</div>

</div>

<script>

/* NAV */
function mostrar(id){
document.querySelectorAll('.seccion').forEach(s=>s.style.display='none');
document.getElementById(id).style.display='block';
}

/* PERSONAL */
function guardarPersonal(){
let lista=JSON.parse(localStorage.getItem("p")||"[]");

lista.push({
nombre:nombre.value,
dni:dni.value,
cargo:cargo.value,
area:area.value
});

localStorage.setItem("p",JSON.stringify(lista));
cargarPersonal();
}

function cargarPersonal(){
let lista=JSON.parse(localStorage.getItem("p")||"[]");
listaPersonal.innerHTML="";

lista.forEach((p,i)=>{
listaPersonal.innerHTML+=`
<div>${p.nombre} - ${p.cargo}</div>`;
});
}

/* GPS */
let ubicacion="";

function obtenerGPS(){
navigator.geolocation.getCurrentPosition(pos=>{
ubicacion=pos.coords.latitude+","+pos.coords.longitude;
gps.innerText="Ubicación: "+ubicacion;
});
}

/* FOTO */
let imagenBase64="";

foto.addEventListener("change",()=>{
let file=foto.files[0];
let reader=new FileReader();

reader.onload=function(e){
imagenBase64=e.target.result;
preview.src=imagenBase64;
}

reader.readAsDataURL(file);
});

/* INSPECCION */
function guardarInspeccion(){
let lista=JSON.parse(localStorage.getItem("i")||"[]");

lista.push({
area:areaIns.value,
estado:estado.value,
obs:obs.value,
fecha:new Date().toLocaleString(),
gps:ubicacion,
foto:imagenBase64
});

localStorage.setItem("i",JSON.stringify(lista));
cargarIns();
}

function cargarIns(){
let lista=JSON.parse(localStorage.getItem("i")||"[]");
listaIns.innerHTML="";

lista.forEach(i=>{
listaIns.innerHTML+=`
<div>
${i.area} - ${i.estado}
</div>`;
});
}

/* REPORTE */
function generarReporte(){
let datos=JSON.parse(localStorage.getItem("i")||"[]");

let txt="";

datos.forEach((d,i)=>{
txt+=`N°${i+1}
Área:${d.area}
Estado:${d.estado}
Obs:${d.obs}
GPS:${d.gps}
Fecha:${d.fecha}

`;
});

salida.value=txt;
}

/* INIT */
cargarPersonal();
cargarIns();

</script>

</body>
</html>
