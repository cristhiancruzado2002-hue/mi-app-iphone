<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSOMA PRO</title>

<link rel="icon" href="icono.png">

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0a1a2f,#1c2f4a);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.app{
    width:380px;
    background:#2c3e50;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.logo{
    width:70px;
    display:block;
    margin:auto;
}

h1{text-align:center;}

.menu{
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    justify-content:center;
}

.menu button{
    flex:1 1 30%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#3498db;
    color:white;
    cursor:pointer;
}

.activo{
    background:#1abc9c !important;
}

input,select,textarea{
    width:100%;
    margin:5px 0;
    padding:8px;
    border:none;
    border-radius:8px;
}

.btn{
    background:#27ae60;
    padding:10px;
    border:none;
    border-radius:10px;
    color:white;
    width:100%;
    margin-top:5px;
}

.seccion{
    display:none;
    margin-top:10px;
}

.lista{
    background:#1c2833;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    max-height:150px;
    overflow:auto;
    font-size:12px;
}
</style>
</head>

<body>

<div class="app">

<img src="icono.png" class="logo">
<h1>SSOMA PRO</h1>

<div class="menu">
<button onclick="mostrar('personal')">Personal</button>
<button onclick="mostrar('inspeccion')">Inspección</button>
<button onclick="mostrar('reporte')">Reportes</button>
</div>

<!-- PERSONAL -->
<div id="personal" class="seccion">
<h3>Personal</h3>
<input id="nombre" placeholder="Nombre">
<input id="dni" placeholder="DNI">
<input id="cargo" placeholder="Cargo">
<input id="area" placeholder="Área">

<button class="btn" onclick="guardarPersonal()">Guardar</button>

<div class="lista" id="listaPersonal"></div>
</div>

<!-- INSPECCION -->
<div id="inspeccion" class="seccion">
<h3>Inspección SST</h3>

<input id="areaIns" placeholder="Área">
<select id="estado">
<option>Conforme</option>
<option>No conforme</option>
</select>

<textarea id="obs" placeholder="Observación"></textarea>

<button class="btn" onclick="guardarInspeccion()">Guardar</button>

<div class="lista" id="listaInspeccion"></div>
</div>

<!-- REPORTE -->
<div id="reporte" class="seccion">
<h3>Reporte</h3>
<button class="btn" onclick="generarReporte()">Generar</button>
<textarea id="salida" style="height:150px;"></textarea>
</div>

</div>

<script>

function mostrar(id){
document.querySelectorAll('.seccion').forEach(s=>s.style.display='none');
document.getElementById(id).style.display='block';
}

/* PERSONAL */
function guardarPersonal(){
let data={
nombre:nombre.value,
dni:dni.value,
cargo:cargo.value,
area:area.value
};

let lista=JSON.parse(localStorage.getItem("personal")||"[]");
lista.push(data);
localStorage.setItem("personal",JSON.stringify(lista));

cargarPersonal();
}

function cargarPersonal(){
let lista=JSON.parse(localStorage.getItem("personal")||"[]");

listaPersonal.innerHTML="";

lista.forEach((p,i)=>{
listaPersonal.innerHTML+=`
<div>
${p.nombre} - ${p.cargo}
<button onclick="eliminarPersonal(${i})">X</button>
</div>`;
});
}

function eliminarPersonal(i){
let lista=JSON.parse(localStorage.getItem("personal"));
lista.splice(i,1);
localStorage.setItem("personal",JSON.stringify(lista));
cargarPersonal();
}

/* INSPECCION */
function guardarInspeccion(){
let data={
area:areaIns.value,
estado:estado.value,
obs:obs.value,
fecha:new Date().toLocaleString()
};

let lista=JSON.parse(localStorage.getItem("insp")||"[]");
lista.push(data);
localStorage.setItem("insp",JSON.stringify(lista));

cargarInspeccion();
}

function cargarInspeccion(){
let lista=JSON.parse(localStorage.getItem("insp")||"[]");

listaInspeccion.innerHTML="";

lista.forEach(i=>{
listaInspeccion.innerHTML+=`
<div>
${i.area} - ${i.estado}
</div>`;
});
}

/* REPORTE */
function generarReporte(){
let datos=JSON.parse(localStorage.getItem("insp")||"[]");

let txt="";

datos.forEach((d,i)=>{
txt+=`N°${i+1}
Área:${d.area}
Estado:${d.estado}
Obs:${d.obs}
Fecha:${d.fecha}

`;
});

salida.value=txt;
}

/* INIT */
cargarPersonal();
cargarInspeccion();

</script>

</body>
</html>
