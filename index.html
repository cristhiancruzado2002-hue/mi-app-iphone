<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SSOMA App</title>

<!-- ICONO -->
<link rel="icon" type="image/png" href="icono.png?v=3">
<link rel="apple-touch-icon" href="icono.png?v=3">

<!-- COLOR APP -->
<meta name="theme-color" content="#0f172a">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTENEDOR PRINCIPAL */
.app {
    width: 320px;
    background: #1f2937;
    border-radius: 25px;
    padding: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    text-align: center;
}

/* LOGO */
.logo {
    width: 120px;
    margin-bottom: 10px;
}

/* TITULO */
h1 {
    color: white;
    margin: 10px 0 5px;
}

/* SUBTITULO */
.sub {
    color: #9ca3af;
    font-size: 14px;
    margin-bottom: 15px;
}

/* MENU */
.menu {
    background: #374151;
    border-radius: 15px;
    padding: 15px;
}

/* BOTONES */
button {
    width: 45%;
    margin: 5px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #e5e7eb;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #d1d5db;
}

/* TEXTO */
.content {
    margin-top: 15px;
    background: #374151;
    padding: 10px;
    border-radius: 15px;
    color: white;
    font-size: 14px;
}
</style>

</head>

<body>

<div class="app">

    <!-- LOGO -->
    <img src="icono.png" class="logo">

    <h1>SSOMA App</h1>
    <div class="sub">Primera aplicación estilo iPhone</div>

    <div class="menu">
        <button onclick="cambiar('Inicio')">Inicio</button>
        <button onclick="cambiar('Reportes')">Reportes</button>
        <button onclick="cambiar('Personal')">Personal</button>
        <button onclick="cambiar('Ajustes')">Ajustes</button>

        <p id="estado">Estás en Inicio</p>
    </div>

    <div class="content" id="contenido">
        Bienvenido a tu aplicación SSOMA.
    </div>

</div>

<script>
function cambiar(seccion){
    document.getElementById("estado").innerText = "Estás en " + seccion;

    let texto = "";

    if(seccion === "Inicio"){
        texto = "Bienvenido a tu aplicación SSOMA.";
    }
    if(seccion === "Reportes"){
        texto = "Aquí podrás ver reportes de seguridad.";
    }
    if(seccion === "Personal"){
        texto = "Lista de trabajadores próximamente.";
    }
    if(seccion === "Ajustes"){
        texto = "Configuraciones de la app.";
    }

    document.getElementById("contenido").innerText = texto;
}
</script>

</body>
</html>
